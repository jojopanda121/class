<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技成果转化 · 工商注册前的准备清单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-presets="react" src="kjcg_checklist.jsx"></script>
    
    <script type="text/babel" data-presets="react">
        const root = ReactDOM.createRoot(document.getElementById('root'));

        // 模拟本地存储
        window.storage = {
            data: {},
            async get(key) {
                return { value: this.data[key] };
            },
            async set(key, value) {
                this.data[key] = value;
            }
        };

        try {
            root.render(<App />);
        } catch (error) {
            document.body.innerHTML = `<pre style="white-space: pre-wrap; color: red; padding: 16px;">${error.toString()}</pre>`;
            console.error(error);
        }
    </script>
</body>
</html>
